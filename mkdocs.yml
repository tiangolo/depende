site_name: Depende
site_description: Dependency declarations for Python frameworks and tools
site_url: https://depende.tiangolo.com/
theme:
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: lucide/sun
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: lucide/moon
        name: Switch to system preference
  features:
  - content.code.annotate
  - content.code.copy
  # - content.code.select
  - content.footnote.tooltips
  - content.tabs.link
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  # - navigation.instant.preview
  - navigation.instant.progress
  - navigation.path
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow
  icon:
    repo: octicons/mark-github-24
  logo: img/icon-white.svg
  favicon: img/icon.svg
  language: en
repo_name: tiangolo/depende
repo_url: https://github.com/tiangolo/depende

nav:
  - Depende: index.md
  - Release Notes: release-notes.md

markdown_extensions:
  # Material for MkDocs
  material.extensions.preview:
    targets:
      include:
        - "*"
  zensical.extensions.macros:
  # Python Markdown
  abbr:
  attr_list:
  footnotes:
  md_in_html:
  tables:
  toc:
    permalink: true

  # Python Markdown Extensions
  pymdownx.betterem:
    smart_enable: all
  pymdownx.caret:
  pymdownx.highlight:
    line_spans: __span
  pymdownx.inlinehilite:
  pymdownx.keys:
  pymdownx.mark:
  pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
  pymdownx.tilde:
  markdown_include_variants: null

  # pymdownx blocks
  pymdownx.blocks.admonition:
  pymdownx.blocks.details:
  pymdownx.blocks.tab:
    alternate_style: True

  # Other extensions
  mdx_include:

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

extra:
  social:
    - icon: octicons/mark-github-24
      link: https://github.com/tiangolo/depende
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/tiangolo
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/tiangolo.com
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tiangolo

extra_css:
  - css/termynal.css
  - css/custom.css

extra_javascript:
  - js/termynal.js
  - js/custom.js

validation:
  unresolved_references: false
